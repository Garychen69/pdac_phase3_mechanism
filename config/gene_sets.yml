purity_stromal_immune:
  # General non-malignant-content proxy for tumor purity adjustment. Deliberately
  # disjoint from the caf/emt (and every other) signature above: purity should
  # measure overall non-tumor content across immune + stromal + vascular
  # compartments, not "CAF activation" specifically. Regressing the caf_score on
  # a purity covariate built from CAF genes themselves would be partly circular.
  - PTPRC    # CD45, pan-leukocyte
  - THY1     # CD90, generic mesenchymal/stromal marker (not CAF-activation-specific)
  - SPARC    # broadly expressed stromal ECM glycoprotein
  - CD2      # pan T-lymphocyte
  - CD14     # monocyte/myeloid (distinct genes from the macrophage set above)
  - CD34     # endothelial/vascular progenitor (distinct genes from the endothelial set above)
  - LAPTM5   # pan-hematopoietic
  - SERPING1 # complement/stromal

